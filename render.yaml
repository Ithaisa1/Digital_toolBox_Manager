services:
  - type: web
    name: digital-toolbox-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate --schema ../database/prisma/schema.prisma
    startCommand: cd backend && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: digital-toolbox-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://digital-toolbox-manager.onrender.com
      - key: AUTO_DB_SETUP
        value: "false"